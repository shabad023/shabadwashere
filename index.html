<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>shabadwashere</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="room.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box;
      cursor: url('magnifier.png') 12 12, auto; }
  html, body {
    height: 100%;
    background: #040308;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #6a5a50;
  }

  /* Invisible hotspot over the corkboard */
  .hotspot {
    position: absolute;
    cursor: pointer;
    background: transparent;
    z-index: 4;
  }

  /* ---- NAV ---- */
  .nav {
    position: fixed;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex; gap: 10px;
    align-items: center;
  }
  .wordmark {
    font-size: 12px; letter-spacing: 4px;
    color: #e8dcc0;
    padding: 8px 10px 8px 0;
    text-shadow: 0 0 8px #000;
    white-space: nowrap;
  }
  .sound-nav {
    position: fixed;
    top: 14px; right: 16px;
    z-index: 20;
  }
  .sound-nav .nav-link {
    appearance: none;
    -webkit-appearance: none;
    cursor: url('magnifier.png') 12 12, auto;
  }
  .nav-link {
    font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: 3px;
    color: #b9a890;
    background: rgba(10, 7, 5, 0.72);
    border: 1px solid #4a3526;
    padding: 8px 14px;
    text-decoration: none;
    transition: color 0.25s ease, border-color 0.25s ease;
  }
  .nav-link:hover { color: #e8dcc0; border-color: #8a6a48; }
  .nav-link.current { color: #e8dcc0; border-color: #8a6a48; }
</style>
</head>
<body>

<!-- The room (full life) -->
<div class="viewport" id="room-root"></div>

<!-- Corkboard hotspot — placed over the room after it renders -->
<div id="cork-hotspot-host" style="position:fixed; inset:0; z-index:5; pointer-events:none;"></div>

<!-- Top-right SOUND -->
<div class="sound-nav">
  <button id="navSound" class="nav-link">SOUND: OFF</button>
</div>

<!-- Top-center nav -->
<div class="nav">
  <span class="wordmark">SHABADWASHERE</span>
  <a class="nav-link current" href="index.html">THE STUDY</a>
  <a class="nav-link" href="cases.html">CASES</a>
  <a class="nav-link" href="about.html">ABOUT</a>
</div>

<!-- Audio elements (shared across pages) -->
<audio id="bgm" src="soundtrack.mp3" loop preload="none"></audio>
<audio id="fireSnd" src="fire.mp3" loop preload="none"></audio>
<audio id="thunderSnd" src="thunder.mp3" loop preload="none"></audio>
<audio id="lightningSnd" src="lightning.mp3" preload="auto"></audio>

<script src="room.js"></script>
<script src="sound.js"></script>
<script>
/* Add the corkboard hotspot — sized to match the room stage, so a
   click on the cork in the room jumps to cases.html. */
(function() {
  const stage = document.getElementById('stage');
  const host  = document.getElementById('cork-hotspot-host');
  if (!stage || !host) return;
  const hot = document.createElement('div');
  hot.className = 'hotspot';
  hot.style.pointerEvents = 'auto';
  hot.style.left = '0.5%';
  hot.style.top  = '30%';
  hot.style.width  = '9%';
  hot.style.height = '26%';
  hot.addEventListener('click', function() { window.location.href = 'cases.html'; });
  stage.appendChild(hot);
})();
</script>

</body>
</html>
